<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arany AutoCare - LIFF</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Thai', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #94a3b8; margin-bottom: 24px; }
    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top: 4px solid #60a5fa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error { color: #f87171; padding: 12px; background: rgba(248, 113, 113, 0.1); border-radius: 8px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/logo.png" class="logo-img" alt="Arany AutoCare">
    <h1>Arany AutoCare</h1>
    <p class="subtitle">กำลังเชื่อมต่อ LINE...</p>
    <div class="loader" id="loader"></div>
    <div id="loginArea" style="display:none; margin-top: 20px;">
      <p class="subtitle">กรุณาเข้าสู่ระบบ LINE เพื่อใช้งาน</p>
      <button class="btn-primary" onclick="liff.login()">เข้าสู่ระบบ LINE</button>
    </div>
    <div class="error" id="error" style="display:none;"></div>
  </div>
  
  <script>
    const API_BASE = 'https://ui.thegodseller.com/autocare'; // 🇹🇭 Correct Public URL
    
    async function initLiff() {
      const liffId = '2008020536-tuJPR90N'; // Arany AutoCare LIFF
      
      try {
        await liff.init({ liffId });
        
        if (!liff.isLoggedIn()) {
          // 🇹🇭 Loop Protection
          const loginAttempt = sessionStorage.getItem('liff_login_attempt');
          
          if (!loginAttempt) {
             // First attempt: Auto Redirect
             sessionStorage.setItem('liff_login_attempt', '1');
             liff.login({ redirectUri: window.location.href });
             return;
          } else {
             // Second attempt: Stop Loop, Show Button
             sessionStorage.removeItem('liff_login_attempt');
             document.getElementById('loader').style.display = 'none';
             document.getElementById('loginArea').style.display = 'block';
             return;
          }
        }
        
        // 🇹🇭 Clear attempt if logged in
        sessionStorage.removeItem('liff_login_attempt');
        
        const profile = await liff.getProfile();
        const lineUserId = profile.userId;
        
        // Get mode from URL
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode') || 'customer';
        
        // Check if user registered endpoint
        const resp = await fetch(`${API_BASE}/customers/me/${lineUserId}`);
        
        if (resp.status === 404) {
          // Redirect to register
          window.location.href = `register.html?line_user_id=${lineUserId}`;
          return;
        }
        
        if (!resp.ok) throw new Error('API Error: ' + resp.status);
        
        const userData = await resp.json();
        
        // Redirect based on mode and role
        if (mode === 'owner' && userData.role === 'owner') { 
          window.location.href = `owner.html?line_user_id=${lineUserId}`;
        } else {
          window.location.href = `customer.html?line_user_id=${lineUserId}`;
        }
        
      } catch (err) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'เกิดข้อผิดพลาด: ' + err.message;
        console.error(err);
      }
    }
    
    initLiff();
  </script>
</body>
</html>
